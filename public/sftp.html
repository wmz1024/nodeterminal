<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SFTP - NodeTerminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-base: #05060f;
      --bg-surface: #0c0e1a;
      --bg-elevated: #131627;
      --bg-card: #181b2e;
      --bg-input: #1c2038;
      --bg-hover: #222744;
      --text-primary: #eef0ff;
      --text-secondary: #6b7194;
      --text-tertiary: #444a6b;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --accent-glow: rgba(108, 92, 231, 0.25);
      --accent-gradient: linear-gradient(135deg, #6c5ce7, #a29bfe);
      --danger: #ff6b6b;
      --danger-glow: rgba(255,107,107,0.2);
      --success: #00e676;
      --success-glow: rgba(0,230,118,0.15);
      --warning: #ffd93d;
      --border: rgba(255, 255, 255, 0.06);
      --border-light: rgba(255, 255, 255, 0.1);
      --radius-sm: 8px;
      --radius-md: 12px;
    }
    body {
      font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }

    /* ===== Topbar ===== */
    .topbar {
      height: 44px; min-height: 44px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 10px;
    }
    .topbar-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--bg-elevated); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .topbar-icon svg { width: 15px; height: 15px; stroke: var(--accent-light); fill: none; }
    .topbar-title {
      font-size: 13px; font-weight: 600; color: var(--text-primary);
      display: flex; align-items: center; gap: 8px; min-width: 0;
    }
    .topbar-title span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-sub {
      font-size: 11px; color: var(--text-tertiary); font-weight: 400;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .conn-badge {
      display: flex; align-items: center; gap: 5px; font-size: 11px;
      color: var(--text-tertiary); padding: 4px 12px; border-radius: 20px;
      background: var(--bg-elevated); border: 1px solid var(--border);
      font-weight: 500;
    }
    .conn-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary); }
    .conn-badge.connected { color: var(--success); border-color: rgba(0,230,118,0.2); background: rgba(0,230,118,0.05); }
    .conn-badge.connected .dot { background: var(--success); }

    .tb-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 5px; padding: 5px 12px; border: 1px solid var(--border);
      background: var(--bg-elevated); color: var(--text-secondary);
      border-radius: 6px; font-size: 11px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .tb-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }
    .tb-btn.danger { border-color: rgba(255,107,107,0.3); color: var(--danger); }
    .tb-btn.danger:hover { background: var(--danger); color: #fff; }

    /* ===== Main Content ===== */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ===== Toolbar ===== */
    .toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }
    .toolbar-btn {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 6px 12px; border: 1px solid var(--border);
      background: var(--bg-elevated); color: var(--text-secondary);
      border-radius: 6px; font-size: 11px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .toolbar-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }
    .toolbar-btn svg { flex-shrink: 0; }
    .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .toolbar-path {
      flex: 1; display: flex; align-items: center; gap: 2px;
      font-size: 12px; overflow-x: auto; white-space: nowrap;
      scrollbar-width: none; min-width: 0;
    }
    .toolbar-path::-webkit-scrollbar { display: none; }
    .path-crumb {
      color: var(--text-tertiary); cursor: pointer; padding: 3px 6px;
      border-radius: 4px; transition: all 0.15s; flex-shrink: 0;
    }
    .path-crumb:hover { color: var(--accent-light); background: var(--bg-hover); }
    .path-crumb.current { color: var(--text-primary); font-weight: 600; cursor: default; }
    .path-crumb.current:hover { background: transparent; }
    .path-sep { color: var(--text-tertiary); opacity: 0.4; flex-shrink: 0; padding: 0 1px; }

    /* ===== File Grid ===== */
    .file-area {
      flex: 1; overflow-y: auto; padding: 8px 16px;
    }
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .file-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--bg-surface); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s; position: relative;
      overflow: hidden;
    }
    .file-card:hover { border-color: var(--border-light); background: var(--bg-elevated); }
    .file-card.dir:hover { border-color: rgba(108,92,231,0.3); }
    .file-card-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .file-card-icon.dir { background: rgba(108,92,231,0.1); }
    .file-card-icon.dir svg { stroke: var(--accent-light); }
    .file-card-icon.file { background: rgba(107,113,148,0.1); }
    .file-card-icon.file svg { stroke: var(--text-secondary); }
    .file-card-icon.link { background: rgba(255,217,61,0.1); }
    .file-card-icon.link svg { stroke: var(--warning); }
    .file-card-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 2; stroke-linecap: round; }
    .file-card-info { flex: 1; min-width: 0; }
    .file-card-name {
      font-size: 12px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-card-name.dir { color: var(--accent-light); }
    .file-card-meta {
      font-size: 10px; color: var(--text-tertiary);
      font-family: 'SF Mono', monospace; margin-top: 2px;
    }
    .file-card-actions {
      display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      gap: 2px; background: var(--bg-elevated); padding: 2px; border-radius: 6px;
    }
    .file-card:hover .file-card-actions { display: flex; }
    .fc-btn {
      width: 26px; height: 26px; border: none; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: transparent; color: var(--text-tertiary);
      transition: all 0.15s;
    }
    .fc-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .fc-btn.danger:hover { color: var(--danger); }

    .file-empty {
      padding: 60px 20px; text-align: center;
      color: var(--text-tertiary); font-size: 13px;
      grid-column: 1 / -1;
    }
    .file-loading {
      padding: 60px 20px; text-align: center;
      color: var(--text-tertiary); font-size: 13px;
      grid-column: 1 / -1;
    }
    .file-loading::after {
      content: ''; display: inline-block;
      width: 14px; height: 14px; margin-left: 8px;
      border: 2px solid var(--border-light); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Drop zone */
    .drop-overlay {
      position: fixed; inset: 0;
      background: rgba(108,92,231,0.08);
      border: 3px dashed var(--accent);
      display: none; align-items: center; justify-content: center;
      z-index: 100; color: var(--accent-light);
      font-size: 16px; font-weight: 600;
    }
    .drop-overlay.active { display: flex; }

    /* ===== Status Bar ===== */
    .statusbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px; border-top: 1px solid var(--border);
      background: var(--bg-surface);
      font-size: 10px; color: var(--text-tertiary);
    }

    /* ===== Editor Overlay ===== */
    .editor-overlay {
      position: fixed; inset: 0;
      background: rgba(5,6,15,0.85); backdrop-filter: blur(10px);
      display: flex; align-items: stretch; justify-content: center;
      z-index: 1500; opacity: 0; visibility: hidden;
      transition: all 0.25s; padding: 20px;
    }
    .editor-overlay.show { opacity: 1; visibility: visible; }
    .editor-container {
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 16px; width: 100%; max-width: 900px;
      display: flex; flex-direction: column;
      box-shadow: 0 16px 64px rgba(0,0,0,0.6);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    .editor-overlay.show .editor-container { transform: translateY(0) scale(1); }
    .editor-topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      min-height: 48px; flex-shrink: 0;
    }
    .editor-filename {
      flex: 1; font-size: 13px; font-weight: 600; color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
    }
    .editor-filename svg { flex-shrink: 0; color: var(--accent-light); }
    .editor-dirty { color: var(--warning); font-size: 11px; font-weight: 500; margin-left: 4px; }
    .editor-size { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; }
    .editor-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .editor-btn {
      padding: 6px 14px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.15s; font-family: inherit;
    }
    .editor-btn.save { background: var(--accent); color: #fff; }
    .editor-btn.save:hover { background: var(--accent-light); }
    .editor-btn.save:disabled { opacity: 0.4; cursor: not-allowed; }
    .editor-btn.close { background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--border-light); }
    .editor-btn.close:hover { color: var(--text-primary); background: var(--bg-hover); }
    .editor-body { flex: 1; display: flex; overflow: hidden; }
    .editor-textarea {
      flex: 1; width: 100%; height: 100%; resize: none;
      background: var(--bg-base); color: var(--text-primary);
      border: none; outline: none; padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
      font-size: 13px; line-height: 1.6;
      tab-size: 4; -moz-tab-size: 4;
      white-space: pre; overflow: auto;
    }
    .editor-textarea::placeholder { color: var(--text-tertiary); }
    .editor-statusbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px; border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text-tertiary); flex-shrink: 0;
    }
    .editor-loading {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); font-size: 13px; gap: 10px;
    }
    .editor-loading::after {
      content: ''; width: 16px; height: 16px;
      border: 2px solid var(--border-light); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 2000; pointer-events: none;
    }
    .toast {
      padding: 10px 16px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500;
      background: var(--bg-elevated); border: 1px solid var(--border-light);
      color: var(--text-primary); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: toastIn 0.3s ease;
      pointer-events: auto;
    }
    .toast.error { border-color: rgba(255,107,107,0.3); color: var(--danger); }
    .toast.success { border-color: rgba(0,230,118,0.3); color: var(--success); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .file-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 10px; gap: 6px; }
      .toolbar { padding: 6px 10px; flex-wrap: wrap; }
      .file-area { padding: 8px 10px; }
      .editor-overlay { padding: 0; }
      .editor-container { border-radius: 0; max-width: 100%; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-icon">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="topbar-title">
      <span>SFTP</span>
      <span class="topbar-sub" id="topbarLabel">连接中...</span>
    </div>
    <div class="topbar-right">
      <div class="conn-badge" id="connBadge">
        <span class="dot"></span>
        <span id="connStatusText">连接中</span>
      </div>
      <button class="tb-btn danger" id="disconnectBtn" onclick="disconnect()" style="display:none">断开</button>
    </div>
  </div>

  <div class="toolbar" id="toolbar">
    <button class="toolbar-btn" onclick="navigateTo('/')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </button>
    <button class="toolbar-btn" onclick="goUp()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="toolbar-btn" onclick="refreshDir()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" onclick="promptMkdir()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      新建
    </button>
    <button class="toolbar-btn" onclick="triggerUpload()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上传
    </button>
    <div class="toolbar-sep"></div>
    <div class="toolbar-path" id="breadcrumb"></div>
  </div>

  <div class="main">
    <div class="file-area" id="fileArea">
      <div class="file-grid" id="fileGrid">
        <div class="file-loading">等待连接</div>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span id="statusText">等待连接...</span>
    <span id="itemCount"></span>
  </div>

  <div class="drop-overlay" id="dropOverlay">拖拽文件到此上传</div>

  <input type="file" id="uploadInput" multiple style="display:none" onchange="handleUpload(this.files)">

  <!-- Editor Overlay -->
  <div class="editor-overlay" id="editorOverlay">
    <div class="editor-container">
      <div class="editor-topbar">
        <div class="editor-filename" id="editorFilename">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="editorFileLabel">file.txt</span>
          <span class="editor-dirty" id="editorDirty" style="display:none">●未保存</span>
        </div>
        <span class="editor-size" id="editorSize"></span>
        <div class="editor-actions">
          <button class="editor-btn save" id="editorSaveBtn" onclick="editorSave()" disabled>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            保存
          </button>
          <button class="editor-btn close" onclick="editorClose()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            关闭
          </button>
        </div>
      </div>
      <div class="editor-body" id="editorBody">
        <div class="editor-loading" id="editorLoading">加载中</div>
        <textarea class="editor-textarea" id="editorTextarea" style="display:none" placeholder="空文件" spellcheck="false"></textarea>
      </div>
      <div class="editor-statusbar">
        <span id="editorCursor">行 1, 列 1</span>
        <span id="editorEncoding">UTF-8</span>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="sftp.js"></script>
</body>
</html>
